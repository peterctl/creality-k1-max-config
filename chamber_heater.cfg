# Chamber heater for the K1 Max.
# Pinout:
#   PA0 = Heater fan
#   PC5 = Built-in chamber temperature probe
#   expander:PA0 = PTC heater relay output
#   expander:PA6 = Heater temperature probe

[mcu expander]
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_12000A001653304B4D323431-if00
restart_method: command

# We will reuse the chamber temperature sensor (PC5) for the chamber heater measure,
# so we need to add it to the duplicate pin overrides.
# This section is only needed if `Helper-Script/fans-control.cfg` is disabled.
#[duplicate_pin_override]
#pins: PC5

[static_digital_output expander_led]
pins: !expander:PA4

[temperature_sensor heater_probe]
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: expander:PA6 # T0
min_temp: 0
max_temp: 100

[heater_generic chamber]
heater_pin: expander:PA0
max_power: 0.6
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
control: pid
pid_Kp: 63.418
pid_Ki: 1.342
pid_Kd: 749.125
min_temp: 0
max_temp: 70

[verify_heater chamber]
max_error: 400
check_gain_time: 600
hysteresis: 5
heating_gain: 2

[heater_fan chamber_heater_fan]
pin: PA0
heater: chamber
heater_temp: 45

# Override chamber fan to remove 35 target chamber temperature.
[temperature_fan chamber_fan]
pin: PC0
cycle_time: 0.0100
hardware_pwm: false
max_power: 1
shutdown_speed: 0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
min_temp: 0
max_temp: 70
control: watermark
max_delta: 2
target_temp: 0
max_speed: 1.0
min_speed: 0.0

# Override the M191 macro to use the chamber heater.
[gcode_macro M191]
#rename_existing: M191.1
description: Wait for chamber temperature using heater `chamber`.
gcode:
  {% set s = params.S|float %}
  {% if s > 0 %}
    SET_HEATER_TEMPERATURE HEATER=chamber TARGET={s}
    RESPOND MSG="Heating chamber to {s} C..."
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber_temp" MINIMUM={s - 2}
    RESPOND MSG="Chamber target temperature reached: {s} C"
  {% else %}
    SET_HEATER_TEMPERATURE HEATER=chamber TARGET=0
  {% endif %}
